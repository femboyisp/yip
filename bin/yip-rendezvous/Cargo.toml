[package]
name = "yip-rendezvous-bin"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "yip-rendezvous"
path = "src/main.rs"

[dependencies]
yip-rendezvous = { path = "../../crates/yip-rendezvous" }
yip-obf = { path = "../../crates/yip-obf" }
getrandom = "0.2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "time", "io-util", "sync"] }

[lints]
workspace = true
