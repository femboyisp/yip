[package]
name = "yip-rendezvous-bin"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "yip-rendezvous"
path = "src/main.rs"

[dependencies]
yip-rendezvous = { path = "../../crates/yip-rendezvous" }
yip-obf = { path = "../../crates/yip-obf" }
getrandom = "0.2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "time", "io-util", "sync"] }
# 3c.3 TCP/TLS Trojan front: real-cert TLS termination on the rendezvous
# binary (nginx-like config), matching `yipd`'s 3c.2 TLS-mimicry costume.
# tokio/boring/tokio-boring are scoped to THIS binary only.
boring = "4.22.0"
tokio-boring = "4.22.0"
# REALITY.1 Task 1: pure TLS-ClientHello parser + REALITY auth core
# (src/reality.rs). ring supplies HKDF-SHA256; x25519-dalek supplies raw
# 32-byte-key X25519 ECDH (ring::agreement does not accept raw private-key
# bytes, which the fixed REALITY private key needs); chacha20poly1305 is the
# session-id AEAD seal.
ring = "0.17"
x25519-dalek = { version = "2", features = ["static_secrets"] }
chacha20poly1305 = "0.10"

[dev-dependencies]
# "pem" is required in addition to the brief's ["ring", "crypto"]: the test
# helper writes PEM (cert.pem() / key_pair.serialize_pem()) for
# set_certificate_chain_file/set_private_key_file, which take PEM files.
rcgen = { version = "0.13.2", default-features = false, features = ["ring", "crypto", "pem"] }

[lints]
workspace = true
