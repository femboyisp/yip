[package]
name = "yip-rendezvous-bin"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "yip-rendezvous"
path = "src/main.rs"

[dependencies]
yip-rendezvous = { path = "../../crates/yip-rendezvous" }
yip-obf = { path = "../../crates/yip-obf" }
yip-utls = { path = "../../crates/yip-utls" }
getrandom = "0.2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "time", "io-util", "sync"] }
# 3c.3 TCP/TLS Trojan front: real-cert TLS termination on the rendezvous
# binary (nginx-like config), matching `yipd`'s 3c.2 TLS-mimicry costume.
# tokio/boring/tokio-boring are scoped to THIS binary only.
boring = "4.22.0"
tokio-boring = "4.22.0"
# REALITY.1 Task 1 / REALITY.2 Task 5: pure TLS-ClientHello parser
# (src/reality.rs). The auth seal/open codec itself (HKDF-SHA256 + X25519
# ECDH + ChaCha20-Poly1305) now lives in yip-utls::auth, shared with the
# client; x25519-dalek is still needed directly here for this crate's own
# tests (deriving a public key from a raw private scalar via `StaticSecret`,
# which needs raw 32-byte-key construction — `ring::agreement` doesn't
# accept raw private-key bytes).
x25519-dalek = { version = "2", features = ["static_secrets"] }
# REALITY.3: runtime leaf forgery for the stolen-cert authed acceptor
# (src/reality_cert.rs). Same feature set the tests already used.
rcgen = { version = "0.13.2", default-features = false, features = ["ring", "crypto", "pem"] }
# REALITY.3: map boring Asn1Time validity onto rcgen's OffsetDateTime fields.
time = { version = "0.3", default-features = false, features = ["parsing", "macros"] }

[lints]
workspace = true
